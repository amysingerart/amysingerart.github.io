<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>3D Virtual Art Exhibition</title>
    <!-- Loads the A-Frame VR Framework -->
    <script src="https://aframe.io"></script>
    
    <!-- FIXES THE TOP-LEFT CORNER BUG: Forces canvas to occupy full viewport -->
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        a-scene {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
    </style>
</head>
<body>
    <!-- Explicitly declaring full-screen and clearing default layout restrictions -->
    <a-scene xr-mode-ui="enabled: true" style="position: absolute; top: 0; left: 0;">
        
        <!-- The Asset Management System (Preloads your image securely) -->
        <a-assets>
            <!-- CHANGE 'artwork1.jpg' to your exact uploaded filename -->
            <img id="my-scan" src="images/IMG_0035.jpg">
        </a-assets>

        <!-- Environment Textures and Colors -->
        <a-sky color="#f0f4f8"></a-sky>
        
        <!-- Floor grid line placeholder -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#e2e8f0"></a-plane>

        <!-- Main Gallery Wall -->
        <a-box position="0 2.5 -6" width="10" height="5" depth="0.2" color="#ffffff"></a-box>
        
        <!-- Displaying your scan as a flat image floating slightly in front of the wall -->
        <a-image src="#my-scan" position="0 2.5 -5.8" width="3" height="3"></a-image>

        <!-- Left Wall -->
        <a-box position="-5 2.5 -3" rotation="0 90 0" width="6" height="5" depth="0.2" color="#ffffff"></a-box>

        <!-- Right Wall -->
        <a-box position="5 2.5 -3" rotation="0 -90 0" width="6" height="5" depth="0.2" color="#ffffff"></a-box>

        <!-- Player Camera & 2D Controls (WASD + Mouse Drag) -->
        
            <a-camera look-controls wasd-controls="acceleration: 65"></a-camera>
        
    </a-scene>
</body>
</html>
