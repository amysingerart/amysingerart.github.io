<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D CSS Gallery</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #0a0a0c;
            font-family: system-ui, sans-serif; color: white;
        }

        /* 3D Viewport Box */
        .gallery-container {
            width: 100vw; height: 100vh;
            perspective: 800px; /* Controls perspective depth distortion */
            display: flex; align-items: center; justify-content: center;
        }

        /* The Virtual Room Wrapper (Acts as player coordinates) */
        .room {
            position: relative; width: 800px; height: 500px;
            transform-style: preserve-3d;
            /* JavaScript updates this to handle rotation and walking depth */
            transform: translateZ(-200px) rotateY(0deg) rotateX(0deg);
            transition: transform 0.1s ease-out;
        }

        /* Base Wall Styles */
        .wall {
            position: absolute; width: 100%; height: 100%;
            background: #ffffff; border: 4px solid #111;
            display: flex; align-items: center; justify-content: center;
        }

        /* Main Back Wall facing user */
        .wall-back {
            transform: translateZ(-500px);
            box-shadow: inset 0 0 150px rgba(0,0,0,0.2);
        }

        /* Side Walls */
        .wall-left {
            width: 1000px; /* Deeper walls to form a long room corridor */
            transform: rotateY(90deg) translateZ(-400px) translateX(-500px);
            background: #f0f0f0;
        }
        .wall-right {
            width: 1000px;
            transform: rotateY(-90deg) translateZ(-400px) translateX(500px);
            background: #f0f0f0;
        }

        /* Museum Floor - Fixed to properly align underneath the walls */
        .floor {
            position: absolute; width: 800px; height: 1000px;
            background: #dcdde1;
            /* Rotates 90 deg flat and lowers it exactly to the base of the walls */
            transform: rotateX(90deg) translateZ(250px) translateY(-500px);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.15);
            border: 2px solid #b5b8be;
        }

        /* Picture Frame Styling */
        .art-frame {
            width: 300px; height: 300px;
            background: #1e1e24; padding: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid #111;
        }
        .art-frame img {
            width: 100%; height: 100%; object-fit: contain; background: #fff;
        }

        /* Title Card */
        .placard {
            position: absolute; transform: translateY(200px);
            color: #222; text-align: center; font-size: 14px;
            background: rgba(255,255,255,0.9); padding: 6px 12px; border-radius: 4px;
        }

        /* HUD Navigation Banner */
        .hud-banner {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); background: rgba(0,0,0,0.85);
            padding: 12px 24px; border-radius: 30px; font-size: 14px;
            pointer-events: none; text-align: center; line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        <div class="room" id="galleryRoom">
            <!-- Floor element sits below at your feet -->
            <div class="floor"></div>
            
            <!-- Side Walls -->
            <div class="wall wall-left"></div>
            <div class="wall wall-right"></div>
            
            <!-- Main Exhibition Wall -->
            <div class="wall wall-back">
                <div class="art-frame">
                    <img src="images/IMG_0035.jpg" alt="Gallery Art Scan">
                </div>
                <div class="placard">
                    <strong>Untitled Piece No. 1</strong><br>
                    <span style="color:#666; font-size:12px;">Digital Scan, 2026</span>
                </div>
            </div>
        </div>
    </div>

    <div class="hud-banner">
        ↔️ Move mouse side-to-side to look around<br>
        ⌨️ Press <strong>W</strong> to walk closer | <strong>S</strong> to step backward
    </div>

    <script>
        const room = document.getElementById('galleryRoom');
        
        // Navigation States
        let currentZ = -200; // Starting physical depth distance
        let mouseXAngle = 0;
        let mouseYAngle = 0;

        // 1. Mouse Drag / Move Looking Logic
        window.addEventListener('mousemove', (e) => {
            const xOffset = (e.clientX / window.innerWidth) - 0.5;
            const yOffset = (e.clientY / window.innerHeight) - 0.5;
            
            mouseXAngle = xOffset * 35;  // Camera panning limits
            mouseYAngle = yOffset * -20; 
            updateRoomTransform();
        });

        // 2. Keyboard Walking Controls
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            if (key === 'w' || key === 'arrowup') {
                currentZ += 25; // Steps forward closer to the painting
                if (currentZ > 200) currentZ = 200; // Wall boundary collision safety limits
            }
            if (key === 's' || key === 'arrowdown') {
                currentZ -= 25; // Steps backwards
                if (currentZ < -600) currentZ = -600;
            }
            updateRoomTransform();
        });

        // 3. Centralized View Engine Update
        function updateRoomTransform() {
            room.style.transform = `translateZ(${currentZ}px) rotateY(${mouseXAngle}deg) rotateX(${mouseYAngle}deg)`;
        }
    </script>

</body>
</html>
