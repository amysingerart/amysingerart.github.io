<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual 3D Exhibition Room</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #1a1a1a;
            font-family: system-ui, sans-serif; color: white;
        }

        /* 3D Viewport Box */
        .gallery-container {
            width: 100vw; height: 100vh;
            perspective: 1000px; /* Gives the depth effect */
            display: flex; align-items: center; justify-content: center;
        }

        /* The Virtual Room Walls */
        .room {
            position: relative; width: 800px; height: 500px;
            transform-style: preserve-3d;
            transform: translateZ(100px);
            transition: transform 0.1s ease-out;
        }

        /* Wall Blueprints */
        .wall {
            position: absolute; width: 100%; height: 100%;
            background: #f4f4f4; border: 2px solid #ddd;
            display: flex; align-items: center; justify-content: center;
        }

        /* Main Back Wall facing user */
        .wall-back {
            transform: translateZ(-300px);
            background: #ffffff;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.1);
        }

        /* Side Walls */
        .wall-left {
            width: 600px;
            transform: rotateY(90deg) translateZ(-300px);
            background: #eaeaea;
            left: 0;
        }
        .wall-right {
            width: 600px;
            transform: rotateY(-90deg) translateZ(-500px);
            background: #eaeaea;
            right: 0;
        }

        /* Museum Floor */
        .floor {
            position: absolute; width: 800px; height: 600px;
            background: #e2e8f0;
            transform: rotateX(90deg) translateZ(50px) translateY(-300px);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
        }

        /* Picture Frame Styling */
        .art-frame {
            width: 280px; height: 280px;
            background: #111; padding: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-bottom: 3px solid #000;
        }
        .art-frame img {
            width: 100%; height: 100%; object-fit: contain; background: #fff;
        }

        /* Text Placard under artwork */
        .placard {
            position: absolute; transform: translateY(180px);
            color: #333; text-align: center; font-size: 14px;
        }

        /* Navigation HUD Banner */
        .hud-banner {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); background: rgba(0,0,0,0.85);
            padding: 12px 24px; border-radius: 30px; font-size: 14px;
            pointer-events: none; letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        <!-- The Virtual Exhibition Environment -->
        <div class="room" id="galleryRoom">
            <div class="floor"></div>
            <div class="wall wall-left"></div>
            
            <!-- Main Exhibition Wall -->
            <div class="wall wall-back">
                <div class="art-frame">
                    <!-- Automatically loads your uploaded artwork -->
                    <img src="images/IMG_0035.jpg" alt="Gallery Art Scan">
                </div>
                <div class="placard">
                    <strong>Untitled Piece No. 1</strong><br>
                    <span style="color:#666; font-size:12px;">Digital Scan, 2026</span>
                </div>
            </div>
            
            <div class="wall wall-right"></div>
        </div>
    </div>

    <div class="hud-banner">↔️ Move your mouse side-to-side to view the room perspective</div>

    <script>
        const room = document.getElementById('galleryRoom');
        
        // Track the mouse to tilt the room perspective smoothly
        window.addEventListener('mousemove', (e) => {
            const xOffset = (e.clientX / window.innerWidth) - 0.5; // Normalized (-0.5 to 0.5)
            const yOffset = (e.clientY / window.innerHeight) - 0.5;
            
            // Calculate a 3D perspective rotation string
            const rotateY = xOffset * 25; // Degrees to pivot sideways
            const rotateX = yOffset * -15; // Degrees to pivot up/down
            
            room.style.transform = `translateZ(100px) rotateY(${rotateY}deg) rotateX(${rotateX}deg)`;
        });
    </script>

</body>
</html>
