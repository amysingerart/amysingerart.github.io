<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Virtual Art Exhibition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a202c; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
    <!-- Load Three.js core library directly -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <script>
        // 1. Create the 3D Virtual Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f4f8);

        // 2. Camera Setup (Field of view, aspect ratio, near, far)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 3); // 1.6 meters high simulating eye-level

        // 3. Renderer Setup
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 4. Add Studio Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        // 5. Build the Gallery Room Floor
        const floorGeo = new THREE.PlaneGeometry(20, 20);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xe2e8f0 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2; // Lay flat
        scene.add(floor);

        // 6. Build the Art Gallery Exhibition Wall
        const wallGeo = new THREE.BoxGeometry(8, 4, 0.2);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(0, 2, -3); // Placed 3 meters back
        scene.add(wall);

        // 7. Load and Map your Scanned Artwork Asset
        const textureLoader = new THREE.TextureLoader();
        // Uses a secure relative file path for GitHub Pages
        textureLoader.load('images/IMG_0035.jpg', function(texture) {
            // Once image loads successfully, map it to a flat frame mesh
            const artGeo = new THREE.PlaneGeometry(2.5, 2.5);
            const artMat = new THREE.MeshBasicMaterial({ map: texture });
            const artwork = new THREE.Mesh(artGeo, artMat);
            artwork.position.set(0, 2, -2.85); // Placed flat slightly in front of the white wall
            scene.add(artwork);
        }, undefined, function(err) {
            console.log("Image texture failed to load, initializing color placeholder card instead.");
            // Fallback colorful block placeholder card if path breaks
            const fallbackGeo = new THREE.PlaneGeometry(2.5, 2.5);
            const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xff4a4a });
            const fallbackArtwork = new THREE.Mesh(fallbackGeo, fallbackMat);
            fallbackArtwork.position.set(0, 2, -2.85);
            scene.add(fallbackArtwork);
        });

        // 8. Handle Browser Window Resizing dynamically
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 9. Basic Interactive Camera Look Loop (Mouse movement interaction)
        let mouseX = 0;
        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - window.innerWidth / 2) / 100;
        });

        // 10. Core Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            // Smoothly ease camera view angle based on mouse coordinate drifts
            camera.lookAt(mouseX, 1.6, -3);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
