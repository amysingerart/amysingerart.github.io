<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Virtual Art Exhibition</title>
    
    <!-- Using the cloudflare CDN version which has higher compatibility with GitHub Pages -->
    <script src="https://cloudflare.com"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a202c; /* Fallback dark background if WebGL fails */
        }
    </style>
</head>
<body>

    <!-- Embedded tag tells the browser to safely calculate canvas size automatically -->
    <a-scene embedded style="width: 100vw; height: 100vh;">
        
        <!-- Standard primitive assets that require zero external images to load -->
        <a-sky color="#7393B3"></a-sky>
        
        <!-- Bright virtual ground floor -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#e2e8f0"></a-plane>

        <!-- A bright red box placed directly in front of you so you instantly know if 3D is rendering -->
        <a-box position="0 1.5 -3" width="1" height="1" depth="1" color="#ff4a4a"></a-box>

        <!-- Your Gallery Wall behind the box -->
        <a-box position="0 2.5 -5" width="8" height="5" depth="0.2" color="#ffffff"></a-box>
        
        <!-- Your Scan loaded directly via a relative URL path -->
        <a-image src="images/IMG_0035.jpg" position="0 2.5 -4.8" width="3" height="3"></a-image>

        <!-- Camera Rig -->
        
            <a-camera look-controls="pointerLockEnabled: false" wasd-controls="acceleration: 65"></a-camera>
        
        
    </a-scene>

</body>
</html>
