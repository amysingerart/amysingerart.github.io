<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Art Gallery</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background-color: #fcfcfc;
            color: #222;
            margin: 0;
            padding: 2rem;
            text-align: center;
        }
        header {
            margin-bottom: 3rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .vr-btn {
            display: inline-block;
            background-color: #111;
            color: #fff;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
        }
        .vr-btn:hover {
            background-color: #333;
            transform: translateY(-2px);
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            max-width: 1000px;
            margin: 4rem auto 0 auto;
        }
        .placeholder-card {
            background-color: #f0f0f0;
            border: 2px dashed #ccc;
            padding: 4rem 1rem;
            color: #666;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Art Gallery</h1>
        <p>Explore my scanned artwork in a traditional layout or step inside the exhibition.</p>
        <br>
        <!-- This links directly to our upcoming VR page -->
        <a href="vr-gallery.html" class="vr-btn">🕶️ Enter 3D / VR Gallery</a>
    </header>

    <main>
        <section class="gallery-grid">
            <div class="placeholder-card">Artwork 1 Placeholder</div>
            <div class="placeholder-card">Artwork 2 Placeholder</div>
            <div class="placeholder-card">Artwork 3 Placeholder</div>
        </section>
    </main>

</body>
</html>
